backend:
  name: github
  repo: makuz-sell/koldesell
  branch: main
  base_url: https://koldesell-auth.markusgpt02.workers.dev
  auth_endpoint: /auth

media_folder: "pildid"
public_folder: "/pildid"

collections:
  - name: "galerii"
    label: "Tehtud tööd"
    folder: "content/galerii"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Pealkiri", name: "title", widget: "string"}
      - {label: "Kuupäev", name: "date", widget: "datetime"}
      - {label: "Pilt", name: "image", widget: "image"}
      - {label: "Kirjeldus", name: "description", widget: "text", required: false}
